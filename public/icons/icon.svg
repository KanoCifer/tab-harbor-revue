<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
    <defs>
        <clipPath id="bg-clip">
            <circle cx="64" cy="64" r="60"/>
        </clipPath>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.15"/>
        </filter>
    </defs>

    <!-- Google 四色背景 -->
    <g clip-path="url(#bg-clip)">
        <!-- 左上 - 红色 -->
        <rect x="4" y="4" width="60" height="60" fill="#EA4335"/>
        <!-- 右上 - 黄色 -->
        <rect x="64" y="4" width="60" height="60" fill="#FBBC04"/>
        <!-- 右下 - 绿色 -->
        <rect x="64" y="64" width="60" height="60" fill="#34A853"/>
        <!-- 左下 - 蓝色 -->
        <rect x="4" y="64" width="60" height="60" fill="#4285F4"/>
    </g>

    <!-- 白色圆形遮罩（创造圆角效果） -->
    <circle cx="64" cy="64" r="60" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.3"/>

    <!-- 标签页图标组 -->
    <g transform="translate(64, 64)" filter="url(#shadow)">
        <!-- 后方标签页（带勾选标记） -->
        <rect x="-32" y="-24" width="40" height="32" rx="7" fill="#ffffff" opacity="0.7"/>
        <!-- 勾选标记（居中） -->
        <path d="M -23 -9 L -15 -1 L -3 -15" stroke="#34A853" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"
              opacity="1"/>

        <!-- 中间标签页 -->
        <rect x="-20" y="-14" width="40" height="32" rx="7" fill="#ffffff" opacity="0.75"/>

        <!-- 前方标签页（主要） -->
        <rect x="-8" y="-4" width="40" height="32" rx="7" fill="#ffffff"/>

        <!-- 标签页上的横线（模拟网页内容） -->
        <rect x="-2" y="4" width="20" height="3" rx="1.5" fill="#4285F4" opacity="0.6"/>
        <rect x="-2" y="10" width="28" height="3" rx="1.5" fill="#EA4335" opacity="0.4"/>
        <rect x="-2" y="16" width="16" height="3" rx="1.5" fill="#34A853" opacity="0.3"/>
    </g>
</svg>
