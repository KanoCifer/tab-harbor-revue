name: Build and Release

on:
  push:
    tags:
      - 'v*'  # 当推送标签时触发，如 v1.0.0

permissions:
  contents: write  # 允许创建 release

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Build extension
      run: npm run build

    - name: Create zip archive
      run: |
        cd dist
        zip -r ../tab-harbor-revue-${{ github.ref_name }}.zip .
        cd ..

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: tab-harbor-revue-${{ github.ref_name }}.zip
        name: Release ${{ github.ref_name }}
        body: |
          ## Tab Harbor reVue ${{ github.ref_name }}
          
          ### 自动构建的 Chrome 扩展安装包
          
          #### 安装说明
          1. 下载 `tab-harbor-revue-${{ github.ref_name }}.zip`
          2. 解压文件
          3. 打开 Chrome 浏览器，访问 `chrome://extensions/`
          4. 开启右上角的「开发者模式」
          5. 点击「加载已解压的扩展程序」
          6. 选择解压后的目录
          
          ### 更新日志
          请查看提交历史了解详细变更。
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
